services:
  - type: web
    name: delivery-scheduler
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false   # ← Render Dashboardで手動設定（Supabase の接続URLを貼る）
